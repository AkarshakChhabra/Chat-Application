<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-wrapper">
        
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Chats</h2>
                <div class="sidebar-actions">
                    <button class="icon-btn" id="new-chat-btn" title="New Chat">+</button>
                    <button class="logout-sm" id="logout-btn">Logout</button>
                </div>
            </div>
            <div class="conversation-list" id="conversation-list">
                </div>
        </div>

        <div class="chat-area">
            <div class="app-header">
                <h1 id="chat-title">Select a chat to start</h1>
                <div id="status-dot" class="hidden"></div>
            </div>
            
            <div class="chat-window" id="chat-window">
                </div>

            <div id="typing-indicator" class="hidden"></div>
            
            <form id="message-form" class="input-area">
                <input type="text" id="user-msg" placeholder="Type a message..." autocomplete="off" disabled>
                <button type="submit" id="send-btn" disabled>Send</button>
            </form>
        </div>
    </div>

    <div id="new-chat-modal" class="login-overlay hidden">
        <div class="login-box">
            <h2>Start New Chat</h2>
            <input type="text" id="new-chat-username" placeholder="Friend's exact username">
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button id="start-chat-btn">Start Chat</button>
                <button id="cancel-chat-btn" style="background: #e4e6eb; color: #333;">Cancel</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
