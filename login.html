<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-overlay">
        <div class="login-box">
            <h2>Welcome</h2>
            <input type="text" id="username-input" placeholder="Enter Username" required>
            <input type="password" id="password-input" placeholder="Enter Password" required>
            
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button id="login-btn">Log In</button>
                <button id="signup-btn" style="background: #e4e6eb; color: #333;">Sign Up</button>
            </div>
            <div id="auth-error" style="color: red; margin-top: 10px; font-size: 14px; display: none;"></div>
        </div>
    </div>

    <script>
        const usernameInput = document.getElementById('username-input');
        const passwordInput = document.getElementById('password-input');
        const errorDiv = document.getElementById('auth-error');

        async function handleAuth(endpoint) {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            if (!username || !password) return showError("Please fill in all fields.");

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                if (!res.ok) return showError(data.error);

                if (endpoint === '/login') {
                    localStorage.setItem('chatUsername', data.username);
                    window.location.href = '/index.html';
                } else {
                    showError("Account created! You can now log in.", "green");
                }
            } catch (err) {
                showError("An error occurred connecting to the server.");
            }
        }

        function showError(msg, color = "red") {
            errorDiv.textContent = msg;
            errorDiv.style.color = color;
            errorDiv.style.display = "block";
        }

        document.getElementById('login-btn').addEventListener('click', () => handleAuth('/login'));
        document.getElementById('signup-btn').addEventListener('click', () => handleAuth('/signup'));
    </script>
</body>
</html>
