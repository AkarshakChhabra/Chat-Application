<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Chat App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-box">
        <h2>Create an Account</h2>
        
        <form id="signup-form">
            <input type="text" id="username" placeholder="Choose a username" required autocomplete="off">
            <input type="password" id="password" placeholder="Create a password" required>
            <button type="submit">Sign Up</button>
        </form>

        <p style="margin-top: 15px; font-size: 14px; color: #555;">
            Already have an account? <a href="/login.html" style="color: var(--primary-blue); text-decoration: none;">Log in</a>
        </p>
    </div>

    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault(); // Stop the page from refreshing
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Send the data to our Node.js server
            const response = await fetch('/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const result = await response.json();
            
            if (response.ok) {
                alert('Account created successfully! You can now log in.');
                window.location.href = '/'; // Send them back to the chat
            } else {
                alert('Error: ' + result.error);
            }
        });
    </script>
</body>
</html>
